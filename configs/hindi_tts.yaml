language: hi
script: devanagari
language_name: Hindi

dataset: ai4bharat/indicvoices_r
dataset_split: train
dataset_language_key: Hindi          # confirm via Cell 5 — try "hindi" lowercase if this errors

speaker_filter: "S4259529700390036132"               # set after speaker-ranking step, then pushed to main

sample_rate: 44100                   # Parler-TTS's DAC codec (ylacombe/dac_44khz) requires this
channels: 1
audio_format: wav

min_duration: 2.0
max_duration: 15.0
min_rms_db: -40.0

remove_empty_transcripts: true
normalize_numerals: true
strip_extra_whitespace: true

description_template: >
  A female speaker delivers her words in a clear, moderate-pace voice in a quiet, close-sounding recording.
description_tokenizer: google/flan-t5-large
prompt_tokenizer: ai4bharat/indic-parler-tts

base_model: ai4bharat/indic-parler-tts
task: tts

eval_split: 0.1
output_dir: models/hindi_tts

training:
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 5.0e-5
  num_train_epochs: 3
  save_steps: 500
  eval_steps: 500
  logging_steps: 50

backup:
  kaggle_dataset: sachi35/hindi-tts-checkpoints

evaluation:
  stt_reference_model: vasista22/whisper-hindi-large-v2
  num_intelligibility_samples: 50
  num_mos_samples: 15
  metrics_output: outputs/hindi_tts_metrics.json

paths:
  raw_dir: data/raw/hi_tts
  processed_dir: data/processed/hi_tts
  manifest: data/processed/hi_tts/manifest.json
  catalogue: data/processed/hi_tts/catalogue.csv