# ============================================================
# Hindi STT Pipeline Config
# To add a new language: copy this file, change the values below.
# Zero code changes required.
# ============================================================

# --- Language Identity ---
language: hi                          # ISO 639-1 code
script: devanagari                    # writing system
language_name: Hindi                  # human-readable label

# --- Data Source ---
dataset: ai4bharat/indicvoices_r      # HuggingFace dataset ID
dataset_split: train                  # which split to pull
dataset_language_key: Hindi           # filter key inside the dataset

# --- Audio Standards ---
sample_rate: 16000                    # Hz — Whisper expects 16kHz
channels: 1                           # mono
audio_format: wav

# --- Duration Filters (seconds) ---
min_duration: 1.0
max_duration: 20.0

# --- Volume Filter ---
min_rms_db: -40.0                     # clips quieter than this are dropped

# --- Text Filters ---
remove_empty_transcripts: true
normalize_numerals: true              # convert Devanagari digits → ASCII
strip_extra_whitespace: true

# --- Alignment ---
alignment_model: WAV2VEC2_ASR_LARGE_LV60K_960H   # WhisperX alignment backbone
min_alignment_score: 0.5             # drop word-segments below this confidence
align_batch_size: 16

# --- Model ---
base_model: openai/whisper-small      # swap to ai4bharat/indicwhisper-hi when available on HF
task: transcribe

# --- Training (used in Week 3) ---
eval_split: 0.1

# IMPORTANT: output_dir points to Kaggle's local working disk — fast and free.
# The drive_backup_dir inside training: handles syncing a resumable copy to
# Drive without filling it up. On Colab, change output_dir to /content/models/hindi_stt.
output_dir: /kaggle/working/models/hindi_stt

# --- Kaggle audio path remapping ---
# When running on Kaggle, audio chunks are extracted to subfolders of this path.
# The manifest.json paths (e.g. data/raw/hi/sample_000000.wav) are automatically
# remapped to /kaggle/input/indic-voices-hi/audio_chunk_00/sample_000000.wav.
# COMMENT THIS LINE OUT when running on Colab/local (paths used as-is).
kaggle_input_dir: /kaggle/input/datasets/sachi35/indicvoices-hindi-stage1

training:
  num_train_epochs: 3
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  learning_rate: 1e-5
  warmup_steps: 100
  save_steps: 2500
  eval_steps: 2500                    # match save_steps so eval runs at same cadence
  logging_steps: 25
  fp16: true
  gradient_checkpointing: true
  dataloader_num_workers: 2
  # Checkpoints are synced here after every save so you can resume across
  # Kaggle sessions. Points to Drive via the Kaggle-Drive integration,
  # or comment out if not using Drive backup.
  kaggle_backup_dataset_id: sachi35/hindi-stt-checkpoints

# --- Paths (relative to project root, used for ingest/clean/align stages) ---
# On Kaggle for training, manifest is read from the mounted dataset.
paths:
  raw_dir: data/raw/hi
  processed_dir: data/processed/hi
  manifest: data/processed/hi/manifest.json
  catalogue: data/processed/hi/catalogue.csv